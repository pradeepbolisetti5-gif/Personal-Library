<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; }
        .book-card:hover .controls { opacity: 1; }
        .status-badge { backdrop-filter: blur(8px); background: rgba(255, 255, 255, 0.85); }
        /* Match the rounded style from your photo */
        .custom-rounded { border-radius: 28px; }
        .image-rounded { border-radius: 24px 24px 0 0; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 mb-10">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg shadow-indigo-200">
                <i data-lucide="library"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">MyLibrary</h1>
        </div>
        
        <div class="relative w-full md:w-[450px]">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
            <input id="search" type="text" placeholder="Search books by title or author..." 
                class="w-full pl-12 pr-4 py-3 rounded-2xl border-none bg-white shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <button onclick="openModal()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-semibold hover:bg-slate-800 transition-all flex items-center gap-2 shadow-md">
            <i data-lucide="plus" class="w-5 h-5"></i> Add Book
        </button>
    </header>

    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-6 custom-rounded shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Total Books</p>
                <b id="total" class="text-4xl text-slate-900">0</b>
            </div>
            <div class="bg-white p-6 custom-rounded shadow-sm border border-slate-100 border-l-4 border-l-green-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Read</p>
                <b id="read" class="text-4xl text-green-600">0</b>
            </div>
            <div class="bg-white p-6 custom-rounded shadow-sm border border-slate-100 border-l-4 border-l-amber-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Reading</p>
                <b id="reading" class="text-4xl text-amber-500">0</b>
            </div>
            <div class="bg-white p-6 custom-rounded shadow-sm border border-slate-100 border-l-4 border-l-blue-500">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Want to Read</p>
                <b id="want" class="text-4xl text-blue-600">0</b>
            </div>
        </div>

        <div class="flex gap-3 mb-8 overflow-x-auto pb-2">
            <button onclick="render('all')" class="px-6 py-2 bg-slate-800 text-white rounded-full text-sm font-medium shadow-md">All Books</button>
            <button onclick="render('read')" class="px-6 py-2 bg-white text-slate-600 border border-slate-200 rounded-full text-sm font-medium hover:bg-slate-50">Read</button>
            <button onclick="render('reading')" class="px-6 py-2 bg-white text-slate-600 border border-slate-200 rounded-full text-sm font-medium hover:bg-slate-50">Reading</button>
            <button onclick="render('want')" class="px-6 py-2 bg-white text-slate-600 border border-slate-200 rounded-full text-sm font-medium hover:bg-slate-50">Want to Read</button>
        </div>

        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-8"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 items-center justify-center p-4">
        <div class="bg-white rounded-[32px] p-8 w-full max-w-md shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-900">Add New Book</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4">
                <input id="title" placeholder="Book Title" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-100">
                <input id="author" placeholder="Author Name" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-100">
                <select id="status" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 cursor-pointer">
                    <option value="want">Want to Read</option>
                    <option value="reading">Reading</option>
                    <option value="read">Read</option>
                </select>
                <div class="pt-2">
                    <label class="block text-sm font-medium text-slate-500 mb-2 ml-1">Upload Cover (Optional)</label>
                    <input type="file" id="cover" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
                <button onclick="addBook()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 mt-4">Save Book</button>
            </div>
        </div>
    </div>

    <script>
        // Load existing books from storage, or use these defaults if empty
        let books = JSON.parse(localStorage.getItem('books')) || [
            { title: "To Kill a Mockingbird", author: "Harper Lee", status: "want", img: "https://covers.openlibrary.org/b/isbn/9780061120084-L.jpg" },
            { title: "1984", author: "George Orwell", status: "reading", img: "https://covers.openlibrary.org/b/isbn/9780451524935-L.jpg" },
            { title: "The Midnight Library", author: "Matt Haig", status: "read", img: "https://covers.openlibrary.org/b/isbn/9780525559474-L.jpg" }
        ];

        let coverData = '';

        function stats() {
            document.getElementById('total').innerText = books.length;
            document.getElementById('read').innerText = books.filter(b => b.status === 'read').length;
            document.getElementById('reading').innerText = books.filter(b => b.status === 'reading').length;
            document.getElementById('want').innerText = books.filter(b => b.status === 'want').length;
        }

        async function fetchBookCover(title) {
            try {
                const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}`);
                const data = await res.json();
                return data.items?.[0]?.volumeInfo?.imageLinks?.thumbnail.replace('http:', 'https:') || 'https://via.placeholder.com/300x450?text=No+Cover';
            } catch { return 'https://via.placeholder.com/300x450?text=No+Cover'; }
        }

        function render(filter = 'all') {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? books : books.filter(b => b.status === filter);

            filtered.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = 'book-card bg-white custom-rounded overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 relative group flex flex-col h-full border border-slate-100';

                const statusLabels = { read: 'Read', reading: 'Reading', want: 'Want to Read' };
                const statusColors = { read: 'text-green-600', reading: 'text-amber-600', want: 'text-blue-600' };
                const statusIcons = { read: 'check-circle-2', reading: 'book-open', want: 'bookmark' };

                div.innerHTML = `
                <div class="relative h-[300px] overflow-hidden">
                    <img src="${b.img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="status-badge absolute top-4 right-4 px-3 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-tight ${statusColors[b.status]} shadow-sm flex items-center gap-1.5">
                        <i data-lucide="${statusIcons[b.status]}" class="w-3 h-3"></i>
                        ${statusLabels[b.status]}
                    </div>
                    <div class="controls absolute bottom-4 left-0 right-0 flex justify-between px-6 opacity-0 transition-opacity duration-300 z-10">
                        <button class="p-3 bg-white/25 backdrop-blur-lg rounded-full text-white hover:bg-indigo-500 transition-colors shadow-lg">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </button>
                        <button onclick="deleteBook(${i})" class="p-3 bg-red-500/80 backdrop-blur-lg rounded-full text-white hover:bg-red-600 transition-colors shadow-lg">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                </div>
                <div class="p-6">
                    <h4 class="font-bold text-slate-800 leading-snug mb-1 text-lg line-clamp-2">${b.title}</h4>
                    <p class="text-slate-400 text-sm font-medium flex items-center gap-1">
                        <i data-lucide="user" class="w-3 h-3"></i> ${b.author}
                    </p>
                </div>`;
                grid.appendChild(div);
            });
            stats();
            localStorage.setItem('books', JSON.stringify(books));
            lucide.createIcons();
        }

        async function addBook() {
            const titleVal = document.getElementById('title').value;
            const authorVal = document.getElementById('author').value;
            if(!titleVal) return alert("Please enter a book title");

            let imgUrl = coverData || await fetchBookCover(titleVal);

            books.push({ 
                title: titleVal, 
                author: authorVal || "Unknown Author", 
                status: document.getElementById('status').value, 
                img: imgUrl 
            });
            
            closeModal();
            render();
        }

        function deleteBook(index) {
            if(confirm("Remove this book from your library?")) {
                books.splice(index, 1);
                render();
            }
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { 
            document.getElementById('modal').style.display = 'none'; 
            document.getElementById('title').value = '';
            document.getElementById('author').value = '';
            coverData = '';
        }

        document.getElementById('cover').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = event => coverData = event.target.result;
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('search').addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            render(); // Refresh grid based on search
            const cards = document.querySelectorAll('.book-card');
            cards.forEach(card => {
                const title = card.querySelector('h4').innerText.toLowerCase();
                const author = card.querySelector('p').innerText.toLowerCase();
                if(title.includes(term) || author.includes(term)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        window.onclick = e => { if (e.target == document.getElementById('modal')) closeModal(); }
        
        // Initial render
        render();
    </script>
</body>
</html>
